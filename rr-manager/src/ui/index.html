<!DOCTYPE html>
<html class="rrmHtml" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RR Manager</title>
    <link rel="stylesheet" href="/webman/3rdparty/rr-manager/style.css">
</head>
<body class="rrm shellPage" data-page="shell">
    <div class="shellFrame">
        <header class="hero shellHero">
            <div class="heroMain">
                <div class="heroCopy">
                    <p class="eyebrow" data-i18n="shell.eyebrow">DSM Bootloader Control</p>
                    <h1 data-i18n="common.appName">RR Manager</h1>
                    <p id="shellVersionSummary" class="lead" aria-live="polite">[RRM vX] [RR vX]</p>
                </div>
                <div class="heroLogoCard" aria-label="RR Logo" data-i18n-aria-label="shell.logoAria">
                    <img class="heroLogoImage" src="/webman/3rdparty/rr-manager/images/rr-logo.png" alt="RR Logo" data-i18n-alt="shell.logoAlt">
                </div>
            </div>
        </header>

        <nav class="subnav" id="subnav">
            <button class="active" data-page-target="overview" type="button" data-i18n="nav.overview">Overview</button>
            <button data-page-target="hardware" type="button" data-i18n="nav.hardware">Hardware</button>
            <button data-page-target="config" type="button" data-i18n="nav.config">Config</button>
            <button data-page-target="addons" type="button" data-i18n="nav.addons">Addons</button>
            <button data-page-target="modules" type="button" data-i18n="nav.modules">Modules</button>
            <button data-page-target="tools" type="button" data-i18n="nav.tools">Tools</button>
            <button data-page-target="update" type="button" data-i18n="nav.update">Update</button>
            <div class="subnavSpacer" aria-hidden="true"></div>
            <div class="langSwitch" aria-label="Language" data-i18n-aria-label="shell.languageAria">
                <select id="localeSelect" class="langSelect" aria-label="Language" data-i18n-aria-label="shell.languageAria">
                    <option value="en-US">English (US)</option>
                    <option value="ar-SA">Arabic</option>
                    <option value="de-DE">Deutsch</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                    <option value="ru-RU">Russian</option>
                    <option value="th-TH">Thai</option>
                    <option value="tr-TR">Turkish</option>
                    <option value="uk-UA">Ukrainian</option>
                    <option value="vi-VN">Vietnamese</option>
                    <option value="zh-CN">Simplified Chinese</option>
                    <option value="zh-HK">Traditional Chinese (HK)</option>
                    <option value="zh-TW">Traditional Chinese (TW)</option>
                </select>
            </div>
        </nav>

        <section class="iframeWrap">
            <iframe id="contentFrame" title="RR Manager Content" src="/webman/3rdparty/rr-manager/overview.html" data-i18n-title="shell.contentTitle"></iframe>
        </section>
    </div>
    <script src="/webman/3rdparty/rr-manager/app.js"></script>
</body>
</html>
