<!DOCTYPE html>
<html class="rrmHtml" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RR Manager Update</title>
    <link rel="stylesheet" href="/webman/3rdparty/rr-manager/style.css">
</head>
<body class="rrm subPage compactFlowPage" data-page="update">
    <main class="grid embeddedGrid compactFlow updateFlow">
        <section class="panel compactPanel">
            <div class="panelHead">
                <div>
                    <p class="sectionEyebrow" data-i18n="update.rrmReleaseEyebrow">RRM Release</p>
                    <h2 data-i18n="update.rrmUpgradeTitle">Update RRM</h2>
                </div>
                <button id="checkRrmRelease" type="button" data-i18n="update.rrmCheckRelease">Check RRM Release</button>
            </div>
            <div class="releaseBox" id="rrmReleaseBox">
                <p data-i18n="update.rrmNoReleaseData">No RRM release data.</p>
            </div>
            <div class="actionRow">
                <button id="startRrmOnlineUpdate" type="button" disabled data-i18n="update.rrmUpgradeOnline">Update RRM Online</button>
            </div>
            <label class="field">
                <span data-i18n="update.rrmLocalPath">Local RRM SPK Path</span>
                <input id="rrmLocalPackagePath" type="text" placeholder="/volume1/public/rr-manager_noarch-dsm7_x.y-z.spk" data-i18n-placeholder="update.rrmLocalPathPlaceholder">
            </label>
            <div class="actionRow">
                <button id="startRrmLocalUpdate" type="button" data-i18n="update.rrmUpgradeLocal">Update RRM From Local Path</button>
            </div>
        </section>

        <section class="panel compactPanel">
            <div class="panelHead">
                <div>
                    <p class="sectionEyebrow" data-i18n="update.releaseEyebrow">RR Release</p>
                    <h2 data-i18n="update.upgradeTitle">Update RR</h2>
                </div>
                <button id="checkRelease" type="button" data-i18n="update.checkRelease">Check RR Release</button>
            </div>
            <div class="releaseBox" id="releaseBox">
                <p data-i18n="update.noReleaseData">No RR release data.</p>
            </div>
            <div class="actionRow">
                <button id="startOnlineUpdate" type="button" disabled data-i18n="update.upgradeOnline">Update RR Online</button>
            </div>
            <label class="field">
                <span data-i18n="update.localPath">Local RR ZIP Path</span>
                <input id="localArchivePath" type="text" placeholder="/volume1/public/updateall-26.3.3.zip" data-i18n-placeholder="update.localPathPlaceholder">
            </label>
            <div class="actionRow">
                <button id="startLocalUpdate" type="button" data-i18n="update.upgradeLocal">Update RR From Local Path</button>
            </div>
        </section>

        <section class="panel compactPanel">
            <div class="panelHead">
                <div>
                    <p class="sectionEyebrow" data-i18n="update.stateEyebrow">Update State</p>
                    <h2 data-i18n="update.overviewTitle">Update Overview</h2>
                </div>
                <button id="refreshOverview" type="button" data-i18n="common.refresh">Refresh</button>
            </div>
            <div class="stats" id="overviewStats"></div>
        </section>

        <section class="panel compactPanel wide">
            <div class="panelHead">
                <div>
                    <p class="sectionEyebrow" data-i18n="update.logEyebrow">Activity Feed</p>
                    <h2 data-i18n="update.logTitle">Job Log</h2>
                </div>
                <button id="refreshLog" type="button" data-i18n="update.refreshLog">Refresh Log</button>
            </div>
            <pre id="logView" data-i18n="update.noLog">No log output yet.</pre>
        </section>
    </main>
    <div class="toast" id="toast" hidden></div>
    <script src="/webman/3rdparty/rr-manager/app.js"></script>
</body>
</html>
