    <h1>RR Manager</h1>
    <p>RR Manager edits the bootloader files on <code>/dev/synoboot1</code> and <code>/dev/synoboot3</code> and applies RR update archives to the mounted boot partitions.</p>
    <p>Only change files if you understand the impact. Wrong bootloader settings can prevent DSM from booting.</p>
