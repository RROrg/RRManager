<body>
    <h1>RR Manager</h1>
    <p>RR Manager chỉnh sửa các tệp bootloader trên <code>/dev/synoboot1</code> và <code>/dev/synoboot3</code> và áp dụng các bản lưu trữ cập nhật RR vào các phân vùng khởi động đã được gắn kết.</p>
    <p>Chỉ thay đổi các tệp nếu bạn hiểu rõ tác động của chúng. Cài đặt bootloader sai có thể khiến DSM không thể khởi động.</p>
</body>
</html>
