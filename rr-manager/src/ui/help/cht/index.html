    <title>RR Manager 說明</title>

<body>
    <h1>RR Manager</h1>
    <p>RR Manager 會直接掛載 <code>/dev/synoboot1</code> 到 <code>/dev/synoboot3</code>，並修改其中的 bootloader 檔案。</p>
    <p>請只在清楚了解影響時再儲存設定。錯誤的 bootloader 設定可能導致 DSM 無法啟動。</p>
</body>
</html>
