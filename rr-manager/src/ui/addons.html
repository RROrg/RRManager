<!DOCTYPE html>
<html class="rrmHtml" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RR Manager Addons</title>
    <link rel="stylesheet" href="/webman/3rdparty/rr-manager/style.css">
</head>
<body class="rrm subPage" data-page="addons">
    <main class="panel panelSolo">
        <div class="panelHead">
            <div>
                <p class="sectionEyebrow" data-i18n="addons.eyebrow">Feature Packs</p>
                <h2 data-i18n="nav.addons">Addons</h2>
            </div>
            <div class="actionRow compact">
                <button id="refreshItems" type="button" data-i18n="common.refresh">Refresh</button>
                <button id="saveItems" type="button" data-i18n="addons.save">Save Addons</button>
            </div>
        </div>
        <label class="field">
            <span data-i18n="addons.filter">Filter addons</span>
            <input id="searchInput" type="text" placeholder="Search by name or description" data-i18n-placeholder="addons.searchPlaceholder">
        </label>
        <div class="tableWrap">
            <table class="listTable">
                <thead>
                    <tr>
                        <th class="colName" data-i18n="table.name">Name</th>
                        <th data-i18n="table.description">Description</th>
                        <th data-i18n="table.system">System</th>
                        <th data-i18n="table.enable">Enable</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
        </div>
    </main>
    <div class="toast" id="toast" hidden></div>
    <script src="/webman/3rdparty/rr-manager/app.js"></script>
</body>
</html>
